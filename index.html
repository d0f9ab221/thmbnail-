<!DOCTYPE html><html lang="hi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>YouTube थंबनेल डाउनलोडर</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><header><h1>🎬 YouTube थंबनेल डाउनलोडर</h1><p>कोई भी YouTube वीडियो का थंबनेल मुफ्त डाउनलोड करें</p></header><main><div class="input-group"><input type="text" id="videoUrl" placeholder="YouTube वीडियो का लिंक डालें..."><button id="fetchBtn">थंबनेल लाएं</button></div><div id="preview" class="hidden"><img id="thumbnailImg" alt="थंबनेल"><div class="actions"><a id="downloadLink" download="thumbnail.jpg"><button id="downloadBtn">⬇️ डाउनलोड करें</button></a></div></div><div id="error" class="hidden"><p>❌ कृपया सही YouTube वीडियो लिंक डालें।</p></div></main><footer><p>थंबनेल स्रोत: YouTube</p></footer></div><script src="script.js"></script></body></html>
